<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sourcing Portal v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0f1a; color: #e2e8f0; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .attr-card { transition: all 0.2s ease; border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; }
        input[type="checkbox"]:checked + .attr-card { background: rgba(59, 130, 246, 0.15); border-color: #3b82f6; color: #60a5fa; }
        input[type="checkbox"] { display: none; }
    </style>
</head>
<body class="p-6 md:p-12 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-black text-white tracking-tighter italic">DATA <span class="text-blue-500 not-italic">MINER</span></h1>
                <p class="text-[10px] text-slate-500 font-bold tracking-[0.4em] uppercase mt-1">Global Product Sourcing Engine</p>
            </div>
            <div class="glass px-5 py-2 rounded-2xl flex items-center gap-3 border-emerald-500/20">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] font-black text-emerald-400 uppercase tracking-widest">System Operational</span>
            </div>
        </header>

        <section class="mb-10">
            <h3 class="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest ml-1">Attribute Mapping</h3>
            <div class="grid grid-cols-2 md:grid-cols-6 gap-3">
                <label><input type="checkbox" checked disabled><div class="attr-card p-4 rounded-2xl text-center text-[10px] font-bold">BRAND</div></label>
                <label><input type="checkbox" checked><div class="attr-card p-4 rounded-2xl text-center text-[10px] font-bold">COLOR</div></label>
                <label><input type="checkbox" checked><div class="attr-card p-4 rounded-2xl text-center text-[10px] font-bold">STORAGE</div></label>
                <label><input type="checkbox"><div class="attr-card p-4 rounded-2xl text-center text-[10px] font-bold">5G/4G</div></label>
                <label><input type="checkbox"><div class="attr-card p-4 rounded-2xl text-center text-[10px] font-bold">DISPLAY</div></label>
                <label><input type="checkbox"><div class="attr-card p-4 rounded-2xl text-center text-[10px] font-bold">CAPACITY</div></label>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4">
                <div class="glass p-8 rounded-[2.5rem] border-white/5 shadow-2xl">
                    <label class="text-[10px] font-black text-slate-500 uppercase block mb-3">Target Origin</label>
                    <select id="region" class="w-full bg-slate-900 border border-white/10 rounded-2xl p-4 text-sm outline-none mb-6">
                        <option>India (IN)</option>
                        <option>Europe (EU)</option>
                        <option>UAE / KSA</option>
                    </select>

                    <label class="text-[10px] font-black text-slate-500 uppercase block mb-3">Model Bulk Input</label>
                    <textarea id="model-input" rows="8" class="w-full bg-slate-900 border border-white/10 rounded-2xl p-5 text-sm font-mono outline-none mb-6" placeholder="Paste Model (e.g. SM-E076BDBAINS)"></textarea>
                    
                    <button onclick="startMining()" class="w-full py-5 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black text-xs uppercase tracking-[0.2em] transition-all">Start Sourcing</button>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="glass rounded-[2.5rem] overflow-hidden border-white/5">
                    <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/[0.01]">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Mining Dashboard</span>
                        <div class="flex gap-2">
                            <button onclick="clearAll()" class="px-4 py-2 bg-white/5 hover:bg-red-500/10 hover:text-red-400 rounded-xl text-[10px] font-bold uppercase transition-all">Clear</button>
                            <button onclick="exportCSV()" class="px-4 py-2 bg-blue-600/10 text-blue-400 hover:bg-blue-600/20 rounded-xl text-[10px] font-bold uppercase transition-all">Export CSV</button>
                        </div>
                    </div>
                    <div class="overflow-x-auto h-[480px]">
                        <table class="w-full text-left text-sm">
                            <thead class="sticky top-0 bg-[#0b0f1a] z-10 border-b border-white/5">
                                <tr>
                                    <th class="p-6 text-slate-500 text-[10px] font-black uppercase">Model</th>
                                    <th class="p-6 text-slate-500 text-[10px] font-black uppercase">Color</th>
                                    <th class="p-6 text-slate-500 text-[10px] font-black uppercase">Specs</th>
                                    <th class="p-6 text-slate-500 text-[10px] font-black uppercase">Status</th>
                                </tr>
                            </thead>
                            <tbody id="results-body" class="divide-y divide-white/5"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function clearAll() {
            document.getElementById('model-input').value = '';
            document.getElementById('results-body').innerHTML = '';
        }

        function exportCSV() {
            const rows = Array.from(document.querySelectorAll("tr"));
            if (document.getElementById('results-body').rows.length === 0) return alert("Nothing to export!");
            let csv = rows.map(r => Array.from(r.querySelectorAll("th,td")).map(c => `"${c.innerText.replace(/\n/g, ' ')}"`).join(",")).join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Sourcing_Data.csv";
            link.click();
        }

        function startMining() {
            const input = document.getElementById('model-input').value.trim();
            if(!input) return;
            const models = input.split('\n');
            const body = document.getElementById('results-body');
            
            models.forEach(m => {
                if(m.trim()){
                    body.innerHTML += `
                    <tr class="hover:bg-white/[0.02]">
                        <td class="p-6 font-bold text-white text-xs">${m.trim()}</td>
                        <td class="p-6 text-slate-500 italic text-[10px]">Scanning...</td>
                        <td class="p-6 text-slate-500 italic text-[10px]">Pending Sourcing...</td>
                        <td class="p-6">
                            <span class="px-3 py-1 bg-blue-500/10 text-blue-400 rounded-full text-[9px] font-bold uppercase animate-pulse">
                                Searching: ${m.trim()}
                            </span>
                        </td>
                    </tr>`;
                }
            });
        }
    </script>
</body>
</html>
