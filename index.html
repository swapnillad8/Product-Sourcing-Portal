<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Mining Portal v3.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0f1a; color: #e2e8f0; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .attr-card { transition: all 0.2s ease; border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; }
        input[type="checkbox"]:checked + .attr-card { background: rgba(59, 130, 246, 0.15); border-color: #3b82f6; color: #60a5fa; }
        input[type="checkbox"] { display: none; }
    </style>
</head>
<body class="p-6 md:p-10 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tighter uppercase">Data <span class="text-blue-500">Mining</span> Portal</h1>
                <p class="text-[10px] text-slate-500 font-bold tracking-[0.3em] mt-1 uppercase">Multi-OEM Sourcing Engine</p>
            </div>
            <div class="glass px-4 py-2 rounded-xl text-[10px] font-bold text-emerald-400 border border-emerald-500/20 uppercase tracking-widest">● Engine V3.5 Active</div>
        </header>

        <section class="mb-10">
            <h3 class="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest">Configuration: Field Mapping</h3>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                <label><input type="checkbox" checked disabled><div class="attr-card p-4 rounded-xl text-center text-[10px] font-bold">BRAND</div></label>
                <label><input type="checkbox" checked><div class="attr-card p-4 rounded-xl text-center text-[10px] font-bold">SUBCATEGORY</div></label>
                <label><input type="checkbox" checked><div class="attr-card p-4 rounded-xl text-center text-[10px] font-bold">RAM/STORAGE</div></label>
                <label><input type="checkbox" checked><div class="attr-card p-4 rounded-xl text-center text-[10px] font-bold">COLOR</div></label>
                <label><input type="checkbox"><div class="attr-card p-4 rounded-xl text-center text-[10px] font-bold">CONNECTIVITY</div></label>
                
                <label><input type="checkbox"><div class="attr-card p-4 rounded-xl text-center text-[10px] font-bold">DISPLAY TYPE</div></label>
                <label><input type="checkbox"><div class="attr-card p-4 rounded-xl text-center text-[10px] font-bold">DISPLAY SIZE</div></label>
                <label><input type="checkbox"><div class="attr-card p-4 rounded-xl text-center text-[10px] font-bold">CAPACITY/LOAD</div></label>
                <label><input type="checkbox"><div class="attr-card p-4 rounded-xl text-center text-[10px] font-bold border-dashed border-blue-500/50">DOOR/SPLIT TYPE</div></label>
                <label><input type="checkbox"><div class="attr-card p-4 rounded-xl text-center text-[10px] font-bold">FEATURES (INVERTER/AUTO)</div></label>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="glass p-8 rounded-[2.5rem]">
                    <div class="mb-6">
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-3">Select Origin</label>
                        <select id="origin" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-sm focus:border-blue-500 outline-none">
                            <option>India (IN)</option>
                            <option>Middle East (UAE)</option>
                            <option>Europe (EU)</option>
                        </select>
                    </div>
                    <div class="mb-6">
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-3">Bulk Model Input</label>
                        <textarea id="model-input" rows="8" class="w-full bg-slate-900 border border-white/10 rounded-xl p-5 text-sm font-mono focus:border-blue-500 outline-none" placeholder="SM-E076BDBAINS"></textarea>
                    </div>
                    <button onclick="startMining()" class="w-full py-5 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-blue-600/20 transition-all">Start Sourcing</button>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="glass rounded-[2.5rem] overflow-hidden">
                    <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/[0.01]">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Extraction Results</span>
                        <div class="flex gap-2">
                            <button onclick="clearAll()" class="px-4 py-2 bg-white/5 hover:bg-red-500/10 rounded-xl text-[10px] font-bold uppercase">Clear</button>
                            <button onclick="exportCSV()" class="px-4 py-2 bg-blue-600/10 text-blue-400 rounded-xl text-[10px] font-bold uppercase">Export CSV</button>
                        </div>
                    </div>
                    <div class="overflow-x-auto h-[480px]">
                        <table class="w-full text-left text-sm">
                            <thead class="sticky top-0 bg-[#0b0f1a] border-b border-white/5">
                                <tr class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">
                                    <th class="p-6">Product & Model</th>
                                    <th class="p-6">Sourcing Path</th>
                                    <th class="p-6">Attributes Identified</th>
                                    <th class="p-6">Progress Status</th>
                                </tr>
                            </thead>
                            <tbody id="results-body" class="divide-y divide-white/5"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function clearAll() { document.getElementById('model-input').value = ''; document.getElementById('results-body').innerHTML = ''; }
        function startMining() {
            const input = document.getElementById('model-input').value.trim();
            if(!input) return;
            const models = input.split('\n');
            const origin = document.getElementById('origin').value;
            const body = document.getElementById('results-body');
            
            models.forEach(m => {
                if(m.trim()) {
                    body.innerHTML += `
                    <tr class="hover:bg-white/[0.01]">
                        <td class="p-6">
                            <div class="text-white font-bold">${m.trim()}</div>
                            <div class="text-[9px] text-slate-500 uppercase mt-1">Sourcing Engine Active</div>
                        </td>
                        <td class="p-6 text-slate-400 text-xs">${origin} / OEM</td>
                        <td class="p-6">
                            <div class="flex flex-wrap gap-2">
                                <span class="px-2 py-1 bg-blue-500/10 text-blue-400 rounded text-[9px] font-bold uppercase animate-pulse">Waiting for Engine...</span>
                            </div>
                        </td>
                        <td class="p-6">
                            <span class="px-3 py-1 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 rounded-full text-[9px] font-black uppercase">Pending</span>
                        </td>
                    </tr>`;
                }
            });
        }
        function exportCSV() {
            const rows = Array.from(document.querySelectorAll("tr"));
            let csv = rows.map(r => Array.from(r.querySelectorAll("th,td")).map(c => `"${c.innerText}"`).join(",")).join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Sourcing_Report.csv";
            link.click();
        }
        async function triggerMining(models) {
    const token = "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"; // Personal Access Token
    const repo = "swapnillad8/Product-Sourcing-Portal";

    await fetch(`https://api.github.com/repos/${repo}/actions/workflows/run_miner.yml/dispatches`, {
        method: "POST",
        headers: {
            "Authorization": `Bearer ${token}`,
            "Accept": "application/vnd.github+json"
        },
        body: JSON.stringify({
            ref: "main"
        })
    });
}
        async function startMining() {
    const input = document.getElementById('model-input').value.trim();
    if(!input) return;

    const models = input.split('\n');

    // show pending UI
    const body = document.getElementById('results-body');
    body.innerHTML = models.map(m => `
        <tr>
            <td class="p-6 text-white font-bold">${m}</td>
            <td class="p-6 text-xs">India / OEM</td>
            <td class="p-6 text-xs text-blue-400">Processing...</td>
            <td class="p-6 text-yellow-400">Running</td>
        </tr>
    `).join("");

    await uploadModels(models);
    await triggerMining(models);

    // wait for GitHub Action (~20–40 sec)
    setTimeout(fetchResults, 60000);
    setInterval(fetchResults, 15000);
}
    </script>
</body>
</html>
