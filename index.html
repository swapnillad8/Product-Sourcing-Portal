<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global SKU Miner v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0f1a; color: #e2e8f0; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .attr-card { transition: all 0.2s ease; border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; }
        input[type="checkbox"]:checked + .attr-card { background: rgba(59, 130, 246, 0.15); border-color: #3b82f6; color: #60a5fa; }
        input[type="checkbox"] { display: none; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold text-white tracking-tighter uppercase">Mining <span class="text-blue-500 underline decoration-blue-500/30 underline-offset-8">Portal</span></h1>
            <div class="glass px-4 py-2 rounded-xl text-[10px] font-black text-emerald-400 uppercase tracking-widest flex items-center gap-2">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> Engine Active
            </div>
        </header>

        <section class="mb-8">
            <h3 class="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-[0.2em]">Field Mapping Configuration</h3>
            <div class="grid grid-cols-2 md:grid-cols-6 gap-3">
                <label><input type="checkbox" checked disabled><div class="attr-card p-3 rounded-xl text-center text-[10px] font-bold">BRAND</div></label>
                <label><input type="checkbox" checked><div class="attr-card p-3 rounded-xl text-center text-[10px] font-bold">COLOR</div></label>
                <label><input type="checkbox" checked><div class="attr-card p-3 rounded-xl text-center text-[10px] font-bold">STORAGE</div></label>
                <label><input type="checkbox"><div class="attr-card p-3 rounded-xl text-center text-[10px] font-bold">CONNECTIVITY</div></label>
                <label><input type="checkbox"><div class="attr-card p-3 rounded-xl text-center text-[10px] font-bold">DISPLAY</div></label>
                <label><input type="checkbox"><div class="attr-card p-3 rounded-xl text-center text-[10px] font-bold">LOAD TYPE</div></label>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="glass p-6 rounded-[2rem] border-white/5 shadow-2xl">
                    <div class="mb-4">
                        <label class="text-[10px] font-black text-slate-500 uppercase block mb-2 tracking-widest">Select Origin</label>
                        <select id="region" class="w-full bg-slate-900/50 border border-white/10 rounded-xl p-3 text-sm outline-none focus:ring-1 focus:ring-blue-500">
                            <option>India (IN)</option>
                            <option>Europe (EU)</option>
                            <option>Middle East (UAE)</option>
                        </select>
                    </div>
                    <div class="mb-6">
                        <label class="text-[10px] font-black text-slate-500 uppercase block mb-2 tracking-widest">Model Input</label>
                        <textarea id="model-input" rows="8" class="w-full bg-slate-900/50 border border-white/10 rounded-xl p-4 text-sm font-mono outline-none focus:ring-1 focus:ring-blue-500" placeholder="Paste: SM-E076BDBAINS"></textarea>
                    </div>
                    <button onclick="startMining()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-black text-xs uppercase tracking-widest transition-all shadow-lg shadow-blue-600/20">Start Mining</button>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="glass rounded-[2rem] overflow-hidden border-white/5">
                    <div class="p-5 border-b border-white/5 flex justify-between items-center bg-white/[0.01]">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Extraction Dashboard</span>
                        <div class="flex gap-2">
                            <button onclick="clearAll()" class="px-4 py-2 bg-white/5 hover:bg-red-500/10 hover:text-red-400 rounded-lg text-[10px] font-bold uppercase transition-all">Clear</button>
                            <button onclick="exportCSV()" class="px-4 py-2 bg-blue-600/10 text-blue-400 hover:bg-blue-600/20 rounded-lg text-[10px] font-bold uppercase transition-all">Export CSV</button>
                        </div>
                    </div>
                    <div class="overflow-x-auto h-[450px]">
                        <table class="w-full text-left text-sm">
                            <thead class="sticky top-0 bg-[#0b0f1a] z-10">
                                <tr class="border-b border-white/5">
                                    <th class="p-6 text-slate-500 text-[10px] font-black uppercase tracking-widest">Product Info</th>
                                    <th class="p-6 text-slate-500 text-[10px] font-black uppercase tracking-widest">Attributes</th>
                                    <th class="p-6 text-slate-500 text-[10px] font-black uppercase tracking-widest">Extraction Status</th>
                                </tr>
                            </thead>
                            <tbody id="results-body" class="divide-y divide-white/5">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function clearAll() {
            document.getElementById('model-input').value = '';
            document.getElementById('results-body').innerHTML = '';
        }

        function exportCSV() {
            const rows = Array.from(document.querySelectorAll("tr"));
            if (document.getElementById('results-body').rows.length === 0) return alert("No data found to export!");
            let csvContent = rows.map(r => Array.from(r.querySelectorAll("th,td")).map(c => `"${c.innerText.replace(/\n/g, ' ')}"`).join(",")).join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Sourcing_Results_" + new Date().toISOString().slice(0,10) + ".csv";
            link.click();
        }

        function startMining() {
            const input = document.getElementById('model-input').value.trim();
            if(!input) return alert("Please enter a model number!");
            const models = input.split('\n');
            const body = document.getElementById('results-body');
            
            models.forEach(m => {
                if(m.trim()) {
                    body.innerHTML += `
                        <tr class="hover:bg-white/[0.02] transition-colors">
                            <td class="p-6">
                                <div class="text-white font-bold">${m.trim()}</div>
                                <div class="text-[9px] text-slate-500 mt-1">OEM Sourcing Active</div>
                            </td>
                            <td class="p-6">
                                <div class="text-slate-400 italic text-xs animate-pulse">Scanning attributes...</div>
                            </td>
                            <td class="p-6">
                                <span class="px-2 py-1 bg-blue-500/10 text-blue-400 rounded-md text-[9px] font-bold uppercase tracking-tighter">
                                    Searching: ${m.trim()}
                                </span>
                            </td>
                        </tr>`;
                }
            });
        }
    </script>
</body>
</html>
